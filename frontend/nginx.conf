# ============================================================
# NoteAI 前端 - Nginx 配置文件
# 
# 关键功能：
# 1. 托管 Vue 打包后的静态文件（HTML/CSS/JS）
# 2. 处理 Vue Router 的 history 模式（所有路由指向 index.html）
# 3. 将 /api 请求代理到后端服务
# ============================================================

# HTTP 服务器配置
server {
    # 监听端口（容器内部的端口，与 Dockerfile 的 EXPOSE 对应）
    listen 80;
    
    # 服务器名称（可以是域名或 IP，部署时需修改）
    server_name localhost;

    # ============================================================
    # 静态文件托管
    # 根目录指向 Vue 打包后的 dist 目录
    # ============================================================
    location / {
        # 静态文件根目录
        root /usr/share/nginx/html;
        
        # 默认首页文件
        index index.html index.htm;

        # ============================================================
        # Vue Router history 模式的核心配置
        #
        # 如果不加这个配置，当你直接访问 /student/home 时，
        # Nginx 会去查找 /usr/share/nginx/html/student/home 文件，
        # 找不到就会返回 404。
        #
        # try_files 的作用：
        # 1. 先尝试请求路径对应的文件（如 /js/app.js）
        # 2. 如果没找到，尝试对应的目录（如 /student/）
        # 3. 如果还没找到，返回 index.html
        # 这样 Vue Router 就能接管路由，显示正确的页面
        # ============================================================
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # API 反向代理配置
    #
    # 所有以 /api 开头的请求都会被转发到后端服务
    # 例如：浏览器请求 /api/users/login
    #       -> Nginx 代理到 http://backend:8081/api/users/login
    #
    # 注意：这里的 "backend" 是 docker-compose 中定义的服务名
    # 如果你在 Coolify 中分别部署前后端，需要修改为后端的实际地址
    # ============================================================
    location /api/ {
        # 后端服务地址
        # docker-compose 部署时用服务名：http://backend:8081
        # 分开部署时用实际 IP/域名：http://你的服务器IP:8081
        proxy_pass http://backend:8081;
        
        # 设置请求头，将客户端信息传递给后端
        # 传递客户端真实 IP
        proxy_set_header Host $host;
        # 传递客户端真实 IP
        proxy_set_header X-Real-IP $remote_addr;
        # 传递代理链路信息
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 传递原始协议（http/https）
        proxy_set_header X-Forwarded-Proto $scheme;

        # ============================================================
        # WebSocket 支持（如果后端有 WebSocket 功能）
        # 虽然当前项目没有用到，但保留这里方便扩展
        # ============================================================
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（避免大文件上传或长请求超时）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ============================================================
    # 错误页面配置
    # ============================================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
